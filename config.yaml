server_zenoh_locator: "tcp/127.0.0.1:7447"

# Video codec: h264 or h265
video_codec: "h264"
# Hardware decoding (NVIDIA): true=nvh264dec/nvh265dec, false=avdec_h264/avdec_h265
hw_accel: false

heartbeat_rate: 5.0
teleop_rate: 20.0
ping_rate: 1.0

controller_type: joystick

joystick:
  axis_speed: 1
  axis_steer: 3
  btn_estop: 4          # shoulder button for e-stop toggle
  max_speed: 1.0        # m/s
  max_steer_deg: 27.0
  deadzone: 0.05        # joystick deadzone
  invert_speed: true    # invert speed axis (forward is negative on some controllers)
